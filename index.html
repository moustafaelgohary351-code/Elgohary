<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Atlas Gallery Pro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #uiLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; z-index: 10; color: white; text-align: center;
        }
        .btn { padding: 15px 30px; margin: 10px; border-radius: 30px; border: none; background: #fff; cursor: pointer; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div id="uiLayer">
        <h2>اختر الصور (بدون FileReader)</h2>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📁 استعراض الملفات</button>
        <button class="btn" style="background: #007bff; color: white;" onclick="startApp()">🚀 ابدأ الآن</button>
        <div id="status">جاهز للاختيار</div>
    </div>

    <canvas id="atlasCanvas"></canvas>

    <script>
        const canvas = document.getElementById('atlasCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        
        let userImages = [];
        let pops = []; 

        document.getElementById('fileInput').onchange = (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            userImages = [];
            status.innerText = "جاري التحميل...";

            files.forEach((file, index) => {
                const img = new Image();
                // نستخدم ObjectURL لأنها أسرع وأكثر استقراراً للأجهزة المحمولة
                img.src = URL.createObjectURL(file);
                
                img.onload = () => {
                    userImages.push(img);
                    status.innerText = `تم تحميل ${userImages.length} من ${files.length}`;
                };
                
                img.onerror = () => {
                    console.log("خطأ في تحميل صورة: " + file.name);
                };
            });
        };

        function startApp() {
            if(userImages.length === 0) return alert("لا توجد صور محملة! تأكد من الضغط على 'تم' بعد التحديد.");
            document.getElementById('uiLayer').style.display = 'none';
            animate();
        }

        // إضافة الصور بلمسة أو نقرة
        function addPop(x, y) {
            if(userImages.length === 0) return;
            const randomImg = userImages[Math.floor(Math.random() * userImages.length)];
            pops.push({ x, y, alpha: 1, img: randomImg });
        }

        window.addEventListener('touchstart', (e) => addPop(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('mousedown', (e) => addPop(e.clientX, e.clientY));

        function animate() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            pops.forEach((p, i) => {
                p.alpha -= 0.005;
                
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 80, 0, Math.PI * 2);
                ctx.clip(); 
                ctx.drawImage(p.img, p.x - 80, p.y - 80, 160, 160);
                ctx.restore();

                if(p.alpha <= 0) pops.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    </script>
</body>
</html>
