<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Atlas Independent Panels System</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
        #uiLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 10; color: white; text-align: center; }
        .btn { padding: 15px 30px; margin: 10px; border-radius: 30px; border: none; background: #fff; cursor: pointer; font-weight: bold; font-size: 18px; }
        textarea { padding: 15px; width: 80%; max-width: 400px; height: 150px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="uiLayer">
        <h2>أدخل 10 جمل (جملة في كل سطر)</h2>
        <textarea id="userInput" placeholder="جملة 1&#10;جملة 2&#10;..."></textarea>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📂 اختر الصور بالترتيب</button>
        <button class="btn" style="background: #007bff; color: white;" onclick="startApp()">🚀 ابدأ التأثير</button>
    </div>

    <canvas id="atlasCanvas"></canvas>

    <script>
        const canvas = document.getElementById('atlasCanvas');
        const ctx = canvas.getContext('2d');
        const userInput = document.getElementById('userInput');
        let userImages = [];
        let pops = []; 
        let globalIndex = 0; 

        function startApp() {
            if(userImages.length === 0) return alert("اختر الصور أولاً!");
            document.getElementById('uiLayer').style.display = 'none';
            animate();
        }

        document.getElementById('fileInput').onchange = (e) => {
            userImages = [];
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    let img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => userImages.push(img);
                };
                reader.readAsDataURL(file);
            });
        };

        function addPop(x, y) {
            if(userImages.length === 0) return;
            const lines = userInput.value.split('\n').filter(l => l.trim() !== "");
            
            // اختيار الصورة والجملة المقابلة لها بالترتيب
            const currentImg = userImages[globalIndex % userImages.length];
            const currentText = lines[globalIndex % lines.length] || "تنبيه!";
            globalIndex++;
            
            pops.push({ 
                x, y, 
                startTime: Date.now(), 
                img: currentImg,
                text: currentText,
                size: 80,
                flashColor: Math.random() > 0.5 ? "255, 0, 0" : "0, 100, 255"
            });
        }

        window.addEventListener('touchstart', (e) => { for(let t of e.changedTouches) addPop(t.clientX, t.clientY); });
        window.addEventListener('mousedown', (e) => addPop(e.clientX, e.clientY));

        function animate() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            let now = Date.now();
            
            pops.forEach((p, i) => {
                let elapsed = now - p.startTime;
                
                // --- مرحلة الظهور والتلاشي ---
                if (elapsed < 5000) {
                    ctx.save();
                    ctx.globalAlpha = 1 - (elapsed / 5000);
                    // رسم الصورة دائرية
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(p.img, p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                    ctx.restore();
                    
                    // رسم النص بعد ثانية
                    if (elapsed > 1000) {
                        ctx.save();
                        ctx.font = "bold 40px Arial";
                        ctx.fillStyle = "red";
                        ctx.shadowColor = "white";
                        ctx.shadowBlur = 10;
                        ctx.textAlign = "center";
                        // المسافة 7 سم (تقريبًا 250 بكسل) أسفل الصورة
                        ctx.fillText(p.text, p.x, p.y + p.size + 250);
                        ctx.restore();
                    }
                } 
                // --- مرحلة الومضات ---
                else if (elapsed < 25000) {
                    if ((elapsed - 5000) % 2000 < 50) {
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.clip();
                        ctx.drawImage(p.img, p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                        
                        ctx.globalCompositeOperation = 'screen';
                        let grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                        grad.addColorStop(0, `rgba(${p.flashColor}, 0.9)`);
                        grad.addColorStop(1, `rgba(${p.flashColor}, 0)`);
                        ctx.fillStyle = grad;
                        ctx.fill();
                        ctx.restore();
                    }
                } else {
                    pops.splice(i, 1);
                }
            });
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    </script>
</body>
</html>
