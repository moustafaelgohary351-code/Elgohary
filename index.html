<!DOCTYPE html>
<html>
<head>
    <title> دوس هنا يا حسام  </title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #fafafa;
        }
        .counter-display {
            font-size: 60px;
            color: #1a73e8;
            margin-bottom: 20px;
            transition: color 0.3s;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #34a853;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>عداد الذكاء والشرط</h1>
    
    <div class="counter-display" id="number">0</div>
    
    <button id="addBtn">اضغط للزيادة</button>

    <script>
        let count = 0;

        const numberDisplay = document.getElementById('number');
        const addButton = document.getElementById('addBtn');

        addButton.addEventListener('click', function() {
            count = count + 1;
            numberDisplay.innerText = count;

            if (count >= 20) {
                numberDisplay.style.color = 'yellow'; 
            } else if (count >= 5) { 
                numberDisplay.style.color = 'black'; 
            } else {
                numberDisplay.style.color = '#1a73e8';
            }
        });
    </script>

</body>
</html>
