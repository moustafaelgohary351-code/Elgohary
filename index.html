<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Atlas Visual System - Pro</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; touch-action: none; position: fixed; z-index: 1; }
        
        #uiLayer { 
            position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; background: #000; z-index: 100; color: white; 
            padding: 20px; overflow-y: auto; 
        }
        
        /* القسم العلوي: الصور والزر */
        #mediaSection { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }
        #galleryContainer { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); 
            gap: 10px; width: 100%; max-height: 30vh; overflow-y: auto; margin-bottom: 15px; padding: 10px;
            background: rgba(255,255,255,0.05); border-radius: 10px;
        }
        .thumb-box { display: flex; flex-direction: column; align-items: center; font-size: 10px; }
        .thumb { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #555; transition: 0.3s; }
        .flash-effect { border-color: #007bff; transform: scale(1.1); box-shadow: 0 0 10px #007bff; }

        /* القسم السفلي: النصوص والبدء */
        #controlSection { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
        .btn { padding: 12px 25px; margin: 10px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; }
        #dialogsContainer { margin-bottom: 10px; max-height: 20vh; overflow-y: auto; width: 250px; }
        .text-input { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 8px; width: 180px; }
        .dialog-row { display: flex; align-items: center; margin-bottom: 10px; }
        .floating-text { position: absolute; color: white; font-size: 24px; pointer-events: none; z-index: 60; transition: opacity 2s; background: rgba(0,0,0,0.6); padding: 5px; }
    </style>
</head>
<body>

    <div id="uiLayer">
        <h2>أطلس - نظام العرض المرئي</h2>
        
        <div id="mediaSection">
            <div id="galleryContainer"></div>
            <button class="btn" style="background: #333; color: white;" onclick="document.getElementById('fileInput').click()">📂 اختر حتى 100 صورة</button>
        </div>

        <div id="controlSection">
            <div id="dialogsContainer">
                <div class="dialog-row">
                    <input type="text" class="text-input" placeholder="الجملة 1">
                    <button class="add-btn" onclick="addDialogRow()">+</button>
                </div>
            </div>
            <button class="btn" style="background: #007bff; color: white; font-size: 18px;" onclick="startApp()">🚀 ابدأ العرض</button>
        </div>

        <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFiles(this)">
    </div>

    <canvas id="atlasCanvas"></canvas>

    <script>
        const CONFIG = { fadeDuration: 5000, flashInterval: 5000, imageSize: 80 };
        const canvas = document.getElementById('atlasCanvas');
        const ctx = canvas.getContext('2d');
        let userImages = [];
        let pops = [];
        let globalIndex = 0;

        function handleFiles(input) {
            const container = document.getElementById('galleryContainer');
            container.innerHTML = '';
            userImages = Array.from(input.files).slice(0, 100).map((file, index) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                const box = document.createElement('div');
                box.className = 'thumb-box';
                box.innerHTML = `<span>${index + 1}</span><img src="${img.src}" class="thumb">`;
                container.appendChild(box);
                return img;
            });
            startTutorial();
        }

        function startTutorial() {
            const thumbs = document.querySelectorAll('.thumb');
            let count = 0;
            const interval = setInterval(() => {
                if(count >= 10) return clearInterval(interval);
                let randomThumb = thumbs[Math.floor(Math.random() * thumbs.length)];
                if(randomThumb) {
                    randomThumb.classList.add('flash-effect');
                    setTimeout(() => randomThumb.classList.remove('flash-effect'), 500);
                }
                count++;
            }, 800);
        }

        function addDialogRow() {
            const container = document.getElementById('dialogsContainer');
            document.querySelectorAll('.add-btn').forEach(b => b.style.display = 'none');
            const div = document.createElement('div');
            div.className = 'dialog-row';
            div.innerHTML = `<input type="text" class="text-input" placeholder="الجملة ${container.children.length + 1}"> <button class="add-btn" onclick="addDialogRow()">+</button>`;
            container.appendChild(div);
        }

        function startApp() {
            if(userImages.length === 0) return alert("اختر الصور أولاً!");
            document.getElementById('uiLayer').style.display = 'none';
            animate();
        }

        function showText(text, x, y) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.style.left = (x - 50) + 'px'; el.style.top = (y + 100) + 'px';
            el.innerText = text; document.body.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 2000); }, 2000);
        }

        function addPop(x, y) {
            if(userImages.length === 0) return;
            const inputs = document.querySelectorAll('.text-input');
            const currentText = inputs[globalIndex % inputs.length].value || "---";
            showText(currentText, x, y);
            const myImg = userImages[globalIndex % userImages.length];
            globalIndex++;
            pops.push({ 
                x, y, startTime: Date.now(), img: myImg, size: CONFIG.imageSize, 
                overlayColor: Math.random() > 0.5 ? "rgba(0, 0, 255, 0.4)" : "rgba(128, 0, 128, 0.4)" 
            });
        }

        window.addEventListener('mousedown', (e) => {
            if(document.getElementById('uiLayer').style.display !== 'none') return;
            addPop(e.clientX, e.clientY);
        });

        function animate() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            let now = Date.now();
            pops.forEach((p, i) => {
                let elapsed = now - p.startTime;
                if (elapsed < CONFIG.fadeDuration) {
                    ctx.save(); ctx.globalAlpha = 1 - (elapsed / CONFIG.fadeDuration);
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.clip();
                    ctx.drawImage(p.img, p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                    ctx.restore();
                } else if (elapsed < 250000) {
                    if ((elapsed - CONFIG.fadeDuration) % CONFIG.flashInterval < 50) {
                        ctx.save();
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.clip();
                        ctx.drawImage(p.img, p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                        ctx.fillStyle = p.overlayColor; ctx.fill();
                        ctx.restore();
                    }
                } else { pops.splice(i, 1); }
            });
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    </script>
</body>
</html>
