
<!DOCTYPE html>
<html>
<head>
    <title>تطبيق إدارة المهام الذكي</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            padding: 30px 15px;
            direction: rtl; /* للكتابة من اليمين لليسار */
            text-align: center;
        }
        .container {
            max-width: 400px;
            background: white;
            margin: 0 auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { color: #1a73e8; }
        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 5px;
            outline: none;
        }
        input:focus { border-color: #1a73e8; }
        button {
            padding: 12px 20px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        /* تنسيق قائمة المهام */
        ul {
            list-style: none;
            padding: 0;
            text-align: right;
        }
        li {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid #1a73e8;
        }
        .delete-btn {
            background-color: #ea4335;
            padding: 5px 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>مفكرتي الذكية 📝</h2>
        
        <div class="input-box">
            <input type="text" id="taskInput" placeholder="اكتب مهمتك الجديدة هنا...">
            <button id="addBtn">إضافة</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        // هنا سنكتب السحر البرمجي في 
        //الخطوة القادمة!
           
        // 1️⃣ صيد العناصر من صفحة الـ HTML لكي نتحكم بها
        const taskInput = document.getElementById('taskInput');
        const addButton = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');

        // 2️⃣ تشغيل الدالة عندما يضغط المستخدم على زر الإضافة
        addButton.addEventListener('click', function() {
            const taskText = taskInput.value.trim(); // أخذ النص ومسح المسافات الزائدة

            // شرط ذكي: لو صندوق الكتابة فارغ، لا تفعل شيئاً واخرج
            if (taskText === "") {
                alert("من فضلك اكتب مهمة أولاً!");
                return;
            }

            // 3️⃣ السحر: خلق عنصر قائمة جديد (li) من العدم
            const li = document.createElement('li');
            li.innerText = taskText; // وضع نص المهمة داخل العنصر الجديد

            // 4️⃣ خلق زر الحذف الأحمر وتجهيزه
            const deleteBtn = document.createElement('button');
            deleteBtn.innerText = "حذف";
            deleteBtn.className = "delete-btn"; // إعطائه التنسيق الأحمر الذي جهزناه في الـ CSS

            // برمجة زر الحذف: عندما يضغط المستخدم عليه، يحذف هذا الـ li تحديداً
            deleteBtn.addEventListener('click', function() {
                taskList.removeChild(li);
            });

            // 5️⃣ تركيب الأجزاء: وضع زر الحذف داخل عنصر القائمة، ثم وضع القائمة داخل الـ ul الرئيسية
            li.appendChild(deleteBtn);
            taskList.appendChild(li);

            // 6️⃣ تنظيف صندوق الكتابة ليكون جاهزاً للمهمة القادمة
            taskInput.value = "";
        });
    

    </script>

</body>
</html>
