<!DOCTYPE html>
<html>
<head>
    <title>خطة عملي من الهاتف</title>
    
    <style>
        /* تلوين خلفية الصفحة بالكامل بالرمادي الفاتح المريح للعين */
        body {
            background-color: #f0f2f5;
            font-family: sans-serif; /* تغيير خط الكتابة ليكون أنيقاً */
            padding: 20px;
        }

        /* تغيير لون العنوان الرئيسي إلى الأزرق الداكن */
        h1 {
            color: #1a73e8;
        }

        /* تنسيق حقل الإيميل ليصبح بشكل عصري */
        input[type="email"] {
            padding: 10px;
            border: 2px solid #1a73e8;
            border-radius: 5px; /* جعل حواف الصندوق دائرية وناعمة */
            width: 80%;
        }
    </style>
</head>
<body>

    <h1>مساري الاحترافي لراتب 2000 دولار</h1>
    <p>أهدافي للشهور الثلاثة الأولى:</p>

    <ul>
        <li>إتقان لغة HTML بالكامل من الهاتف.</li>
        <li>فهم كيفية عمل متصفحات الإنترنت.</li>
        <li>البرمجة اليومية لمدة ساعة بدون انقطاع.</li>
    </ul>

    <p>لمتابعة محرك البحث المفضل لدي، اضغط على الرابط بالأسفل:</p>
    
    <a href="https://www.google.com" target="_blank">اضغط هنا لزيارة جوجل</a>
    
    <br><br>
    <label>سجل إيميلك لتبدأ:</label><br>
    <input type="email" placeholder="name@example.com">

</body>
</html>
